# ===========================
# Server
# ===========================
server.port=8080

# ===========================
# PostgreSQL DataSource
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5433/patientcaredb
spring.datasource.username=patientcare_user
spring.datasource.password=patientcare_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Disable Open Session In View to prevent N+1 queries across HTTP lifecycle
spring.jpa.open-in-view=false
# Enable Hibernate statistics for monitoring (disable in prod)
spring.jpa.properties.hibernate.generate_statistics=false

# ===========================
# JWT
# ===========================
app.jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ===========================
# CORS
# ===========================
app.cors.allowed-origins=http://localhost:3000

# ===========================
# WebSocket
# ===========================
app.websocket.endpoint=/ws
app.websocket.topic-prefix=/topic
app.websocket.app-prefix=/app

# ===========================
# Logging
# ===========================
logging.level.com.patientcare=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
